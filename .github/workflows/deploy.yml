name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================================
  # Tests and Checks
  # ============================================================================
  
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Type check backend
        run: cd services/backend && pnpm typecheck
      
      - name: Type check frontend
        run: cd services/frontend && pnpm typecheck
      
      - name: Type check admin
        run: cd services/admin && pnpm typecheck
      
      - name: Lint backend
        run: cd services/backend && pnpm lint
      
      - name: Lint frontend
        run: cd services/frontend && pnpm lint
      
      - name: Lint admin
        run: cd services/admin && pnpm lint
      
      - name: Run tests
        run: |
          if [ -f "services/backend/package.json" ] && grep -q '"test"' services/backend/package.json; then
            cd services/backend && pnpm test
          fi
          if [ -f "services/frontend/package.json" ] && grep -q '"test"' services/frontend/package.json; then
            cd services/frontend && pnpm test
          fi

  # ============================================================================
  # Deploy Backend Worker
  # ============================================================================
  
  deploy-backend:
    name: Deploy Backend Worker
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check backend deploy secrets
        id: backend-secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          INGESTION_ADMIN_SECRET: ${{ secrets.INGESTION_ADMIN_SECRET }}
          CLICKHOUSE_URL: ${{ secrets.CLICKHOUSE_URL }}
          CLICKHOUSE_USERNAME: ${{ secrets.CLICKHOUSE_USERNAME }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
        run: |
          missing=0
          for secret_name in DATABASE_URL BETTER_AUTH_SECRET INGESTION_ADMIN_SECRET CLICKHOUSE_URL CLICKHOUSE_USERNAME CLICKHOUSE_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              echo "Missing GitHub secret for backend upload: ${secret_name}"
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "upload=true" >> "$GITHUB_OUTPUT"
          else
            echo "upload=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write backend secret bundle
        if: steps.backend-secrets.outputs.upload == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          INGESTION_ADMIN_SECRET: ${{ secrets.INGESTION_ADMIN_SECRET }}
          CLICKHOUSE_URL: ${{ secrets.CLICKHOUSE_URL }}
          CLICKHOUSE_USERNAME: ${{ secrets.CLICKHOUSE_USERNAME }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
        run: |
          node <<'EOF'
          const fs = require('node:fs');

          const secrets = {
            DATABASE_URL: process.env.DATABASE_URL,
            BETTER_AUTH_SECRET: process.env.BETTER_AUTH_SECRET,
            INGESTION_ADMIN_SECRET: process.env.INGESTION_ADMIN_SECRET,
            CLICKHOUSE_URL: process.env.CLICKHOUSE_URL,
            CLICKHOUSE_USERNAME: process.env.CLICKHOUSE_USERNAME,
            CLICKHOUSE_PASSWORD: process.env.CLICKHOUSE_PASSWORD,
          };

          fs.writeFileSync('services/backend/.deploy-secrets.json', JSON.stringify(secrets, null, 2));
          EOF

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --dir services/backend exec wrangler deploy

      - name: Upload backend secrets
        if: steps.backend-secrets.outputs.upload == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --dir services/backend exec wrangler secret bulk .deploy-secrets.json

      - name: Skip backend secret upload
        if: steps.backend-secrets.outputs.upload != 'true'
        run: echo "Skipping backend secret upload. Existing Cloudflare Worker secrets will be used."

      - name: Remove backend secret bundle
        if: always()
        run: rm -f services/backend/.deploy-secrets.json

  # ============================================================================
  # Deploy Frontend Pages
  # ============================================================================
  
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build frontend
        run: pnpm --filter @backtest/frontend build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
      
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --dir services/frontend exec wrangler pages deploy dist --project-name=backtest-frontend

  # ============================================================================
  # Deploy Admin Pages
  # ============================================================================
  
  deploy-admin:
    name: Deploy Admin
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build admin
        run: pnpm --filter @backtest/admin build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
      
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --dir services/admin exec wrangler pages deploy dist --project-name=backtest-admin
