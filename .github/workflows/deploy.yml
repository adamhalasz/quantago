name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  detect-changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect path changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              - 'docs/**'
              - 'services/docs/**'
              - 'README.md'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'scripts/deploy-docs.sh'
              - 'setup.sh'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/pr-check.yml'

  # ============================================================================
  # Tests and Checks
  # ============================================================================
  
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Type check backend
        run: cd services/backend && pnpm typecheck
      
      - name: Type check frontend
        run: cd services/frontend && pnpm typecheck
      
      - name: Type check admin
        run: cd services/admin && pnpm typecheck

      - name: Type check landing
        run: cd services/landing && pnpm typecheck

      - name: Type check docs
        run: cd services/docs && pnpm typecheck
      
      - name: Lint backend
        run: cd services/backend && pnpm lint
      
      - name: Lint frontend
        run: cd services/frontend && pnpm lint
      
      - name: Lint admin
        run: cd services/admin && pnpm lint

      - name: Lint landing
        run: cd services/landing && pnpm lint

      - name: Build docs
        run: cd services/docs && pnpm build
      
      - name: Run backend tests
        run: |
          if [ -f "services/backend/package.json" ] && grep -q '"test"' services/backend/package.json; then
            pnpm --dir services/backend test
          fi

      - name: Run frontend tests with coverage
        run: |
          if [ -f "services/frontend/package.json" ] && grep -q '"test"' services/frontend/package.json; then
            pnpm --dir services/frontend test:coverage
          fi

      - name: Upload coverage reports to Codecov
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./services/frontend/coverage/lcov.info
          flags: frontend

  # ============================================================================
  # Deploy Backend Worker
  # ============================================================================
  
  deploy-backend:
    name: Deploy Backend Worker
    runs-on: ubuntu-latest
    needs: test
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate backend production configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          BETTER_AUTH_URL: ${{ vars.BETTER_AUTH_URL }}
          FRONTEND_ORIGIN: ${{ vars.FRONTEND_ORIGIN }}
          ADMIN_ORIGIN: ${{ vars.ADMIN_ORIGIN }}
        run: |
          missing=0
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID BETTER_AUTH_URL FRONTEND_ORIGIN ADMIN_ORIGIN; do
            if [ -z "${!name}" ]; then
              echo "Missing required production setting: ${name}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Check backend deploy secrets
        id: backend-secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          INGESTION_ADMIN_SECRET: ${{ secrets.INGESTION_ADMIN_SECRET }}
          CLICKHOUSE_URL: ${{ secrets.CLICKHOUSE_URL }}
          CLICKHOUSE_USERNAME: ${{ secrets.CLICKHOUSE_USERNAME }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
        run: |
          missing=0
          for secret_name in DATABASE_URL BETTER_AUTH_SECRET INGESTION_ADMIN_SECRET CLICKHOUSE_URL CLICKHOUSE_USERNAME CLICKHOUSE_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              echo "Missing GitHub secret for backend upload: ${secret_name}"
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "upload=true" >> "$GITHUB_OUTPUT"
          else
            echo "upload=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write backend secret bundle
        if: steps.backend-secrets.outputs.upload == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          INGESTION_ADMIN_SECRET: ${{ secrets.INGESTION_ADMIN_SECRET }}
          CLICKHOUSE_URL: ${{ secrets.CLICKHOUSE_URL }}
          CLICKHOUSE_USERNAME: ${{ secrets.CLICKHOUSE_USERNAME }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
        run: |
          node <<'EOF'
          const fs = require('node:fs');

          const secrets = {
            DATABASE_URL: process.env.DATABASE_URL,
            BETTER_AUTH_SECRET: process.env.BETTER_AUTH_SECRET,
            INGESTION_ADMIN_SECRET: process.env.INGESTION_ADMIN_SECRET,
            CLICKHOUSE_URL: process.env.CLICKHOUSE_URL,
            CLICKHOUSE_USERNAME: process.env.CLICKHOUSE_USERNAME,
            CLICKHOUSE_PASSWORD: process.env.CLICKHOUSE_PASSWORD,
          };

          fs.writeFileSync('services/backend/.deploy-secrets.json', JSON.stringify(secrets, null, 2));
          EOF

      - name: Write backend production config
        env:
          BETTER_AUTH_URL: ${{ vars.BETTER_AUTH_URL }}
          FRONTEND_ORIGIN: ${{ vars.FRONTEND_ORIGIN }}
          ADMIN_ORIGIN: ${{ vars.ADMIN_ORIGIN }}
        run: |
          node <<'EOF'
          const fs = require('node:fs');

          function parseJsonc(text) {
            return JSON.parse(
              text
                .replace(/\/\*[\s\S]*?\*\//g, '')
                .replace(/^\s*\/\/.*$/gm, ''),
            );
          }

          const configPath = 'services/backend/wrangler.jsonc';
          const outputPath = 'services/backend/wrangler.production.jsonc';
          const config = parseJsonc(fs.readFileSync(configPath, 'utf8'));

          config.vars = {
            ...(config.vars || {}),
            BETTER_AUTH_URL: process.env.BETTER_AUTH_URL,
            FRONTEND_ORIGIN: process.env.FRONTEND_ORIGIN,
            ADMIN_ORIGIN: process.env.ADMIN_ORIGIN,
          };

          fs.writeFileSync(outputPath, JSON.stringify(config, null, 2));
          EOF

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --dir services/backend exec wrangler deploy --config wrangler.production.jsonc

      - name: Upload backend secrets
        if: steps.backend-secrets.outputs.upload == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --dir services/backend exec wrangler secret bulk .deploy-secrets.json

      - name: Skip backend secret upload
        if: steps.backend-secrets.outputs.upload != 'true'
        run: echo "Skipping backend secret upload. Existing Cloudflare Worker secrets will be used."

      - name: Remove backend secret bundle
        if: always()
        run: rm -f services/backend/.deploy-secrets.json services/backend/wrangler.production.jsonc

  # ============================================================================
  # Deploy Frontend Pages
  # ============================================================================
  
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: test
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate frontend production configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: |
          missing=0
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID VITE_API_URL; do
            if [ -z "${!name}" ]; then
              echo "Missing required frontend setting: ${name}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
      
      - name: Build frontend
        run: pnpm --filter @quantago/frontend build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Ensure frontend Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          FRONTEND_PAGES_PROJECT: ${{ vars.FRONTEND_PAGES_PROJECT || 'quantago-app' }}
        run: |
          pnpm --dir services/frontend exec wrangler pages project create "$FRONTEND_PAGES_PROJECT" --production-branch main || true
      
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          FRONTEND_PAGES_PROJECT: ${{ vars.FRONTEND_PAGES_PROJECT || 'quantago-app' }}
        run: pnpm --dir services/frontend exec wrangler pages deploy dist --project-name="$FRONTEND_PAGES_PROJECT"

  # ============================================================================
  # Deploy Admin Pages
  # ============================================================================
  
  deploy-admin:
    name: Deploy Admin
    runs-on: ubuntu-latest
    needs: test
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate admin production configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: |
          missing=0
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID VITE_API_URL; do
            if [ -z "${!name}" ]; then
              echo "Missing required admin setting: ${name}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
      
      - name: Build admin
        run: pnpm --filter @quantago/admin build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Ensure admin Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          ADMIN_PAGES_PROJECT: ${{ vars.ADMIN_PAGES_PROJECT || 'quantago-admin' }}
        run: |
          pnpm --dir services/admin exec wrangler pages project create "$ADMIN_PAGES_PROJECT" --production-branch main || true
      
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          ADMIN_PAGES_PROJECT: ${{ vars.ADMIN_PAGES_PROJECT || 'quantago-admin' }}
        run: pnpm --dir services/admin exec wrangler pages deploy dist --project-name="$ADMIN_PAGES_PROJECT"

  # ============================================================================
  # Deploy Landing Worker
  # ============================================================================

  deploy-landing:
    name: Deploy Landing
    runs-on: ubuntu-latest
    needs: test
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check landing
        run: cd services/landing && pnpm typecheck

      - name: Deploy landing worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --dir services/landing exec wrangler deploy

  # ============================================================================
  # Deploy Docs Pages
  # ============================================================================

  deploy-docs:
    name: Deploy Docs
    runs-on: ubuntu-latest
    needs:
      - test
      - detect-changes
    if: needs.detect-changes.outputs.docs == 'true'
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate docs production configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=0
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!name}" ]; then
              echo "Missing required docs setting: ${name}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Build docs
        run: pnpm --filter @quantago/docs build

      - name: Ensure docs Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          DOCS_PAGES_PROJECT: ${{ vars.DOCS_PAGES_PROJECT || 'quantago-docs' }}
        run: |
          pnpm --dir services/docs exec wrangler pages project create "$DOCS_PAGES_PROJECT" --production-branch main || true

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          DOCS_PAGES_PROJECT: ${{ vars.DOCS_PAGES_PROJECT || 'quantago-docs' }}
        run: pnpm --dir services/docs exec wrangler pages deploy build --project-name="$DOCS_PAGES_PROJECT"
