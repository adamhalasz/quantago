name: PR Checks

on:
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '20'

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Type check backend
        run: cd services/backend && pnpm typecheck
      
      - name: Type check frontend
        run: cd services/frontend && pnpm typecheck
      
      - name: Type check admin
        run: cd services/admin && pnpm typecheck

      - name: Type check landing
        run: cd services/landing && pnpm typecheck

      - name: Type check docs
        run: cd services/docs && pnpm typecheck
      
      - name: Lint backend
        run: cd services/backend && pnpm lint
      
      - name: Lint frontend
        run: cd services/frontend && pnpm lint
      
      - name: Lint admin
        run: cd services/admin && pnpm lint

      - name: Lint landing
        run: cd services/landing && pnpm lint
      
      - name: Build backend
        run: cd services/backend && pnpm build || echo "No build script"
      
      - name: Build frontend
        run: cd services/frontend && pnpm build
      
      - name: Build admin
        run: cd services/admin && pnpm build

      - name: Build docs
        run: cd services/docs && pnpm build
      
      - name: Run backend tests
        run: |
          if [ -f "services/backend/package.json" ] && grep -q '"test"' services/backend/package.json; then
            pnpm --dir services/backend test
          fi

      - name: Run frontend tests with coverage
        run: |
          if [ -f "services/frontend/package.json" ] && grep -q '"test"' services/frontend/package.json; then
            pnpm --dir services/frontend test:coverage
          fi

      - name: Upload coverage reports to Codecov
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./services/frontend/coverage/lcov.info
          flags: frontend
