name: PR Checks

on:
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '20'

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Type check backend
        run: cd services/backend && pnpm typecheck
      
      - name: Type check frontend
        run: cd services/frontend && pnpm typecheck
      
      - name: Type check admin
        run: cd services/admin && pnpm typecheck
      
      - name: Lint backend
        run: cd services/backend && pnpm lint
      
      - name: Lint frontend
        run: cd services/frontend && pnpm lint
      
      - name: Lint admin
        run: cd services/admin && pnpm lint
      
      - name: Build backend
        run: cd services/backend && pnpm build || echo "No build script"
      
      - name: Build frontend
        run: cd services/frontend && pnpm build
      
      - name: Build admin
        run: cd services/admin && pnpm build
      
      - name: Run tests
        run: |
          if [ -f "services/backend/package.json" ] && grep -q '"test"' services/backend/package.json; then
            cd services/backend && pnpm test
          fi
          if [ -f "services/frontend/package.json" ] && grep -q '"test"' services/frontend/package.json; then
            cd services/frontend && pnpm test
          fi
